<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sound Trigger Timer</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<main class="app">
<section class="card">
<h1>Sound Trigger Timer</h1>

<label>
Alarm Sound
<select id="soundChoice">
<option value="beep">Beep</option>
<option value="alarm">Alarm</option>
<option value="gong">Gong</option>
<option value="woo">Woo-style shout</option>
</select>
</label>

<label>
Delay After Trigger:
<strong><span id="intervalValue">0.45</span>s</strong>
<input id="interval" type="range" min="0.45" max="1.50" step="0.01" value="0.45"/>
</label>

<label>
Trigger Threshold:
<strong><span id="thresholdValue">-35</span>dB</strong>
<input id="threshold" type="range" min="-80" max="-5" step="1" value="-35"/>
</label>

<div class="row">
<button id="armBtn">Arm Trigger</button>
<button id="testBtn">Test Sound</button>
</div>

<div class="status">
<div>State: <span id="state">Idle</span></div>
<div>Elapsed: <span id="elapsed">00:00.00</span></div>
</div>

<div class="meter">
<div id="meterBar"></div>
</div>

<div id="dbReadout">-- dB</div>

<button id="stopBtn">Stop / Reset</button>

<script src="app.js"></script>
</section>
</main>
</body>
</html>
